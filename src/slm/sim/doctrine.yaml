version: 1
notes: >-
  Architect-authored decision doctrine draft for review. The doctrine is
  data, interpreted by doctrine.py (not yet written): for any state and the
  events raised that tick, the interpreter evaluates every rule, and the
  highest-priority firing rule (lowest priority number, ties broken by file
  order) supplies the gold command and rationale for that tick. If no rule
  fires the gold command is the default command. This totality plus the
  threshold structure gives the counterfactual property: perturbing state
  values moves conditions across thresholds and changes the gold call.
semantics:
  condition_form: >-
    Each condition is a three-element list [subject, operator, value]. A
    subject is a metric path (system.metric from schema.SYSTEMS) or an
    event path (event.severity, event.kind) that binds the triggering
    event. Operators are below, at_or_below, above, at_or_above, equals.
    A value is a number, a name from thresholds, a severity (compared by
    its ordinal position in schema.SEVERITIES), an event kind, or 0/1 for
    boolean metrics. All conditions of a rule must hold for it to fire.
  argument_bindings: >-
    Command argument values are literals, or the binding next_sheddable
    (the first load in shed_order not currently shed), last_shed (the most
    recently shed load), next_burn (the identifier of the next scheduled
    burn), triggering_event (the identifier of the event that satisfied the
    rule's event conditions), or a mapping {metric: path} resolving to the
    named metric's current value. A rule whose binding cannot resolve (no
    sheddable load left, nothing shed, no scheduled burn, no triggering
    event) does not fire, so restore and hold rules are inert until their
    preconditions exist.
default_command: monitor
shed_order:
  - science_instrument
  - data_recorder
  - backup_heater
thresholds:
  power_margin_low: 15
  power_margin_restore: 30
  battery_reserve_floor: 25
  thermal_headroom_low: 5
  storage_high_fraction: 0.8
  storage_critical_fraction: 0.95
rules:
  - name: critical_event_escalation
    priority: 5
    when:
      - [event.severity, at_or_above, critical]
    command:
      name: escalate
      arguments:
        reference: triggering_event
        severity: critical
    rationale:
      code: R_CRITICAL_EVENT
      text: a critical event requires the operator's decision authority
  - name: battery_reserve_breach
    priority: 10
    when:
      - [power.battery_charge, below, battery_reserve_floor]
      - [power.margin, below, 0]
    command:
      name: enter_safe_mode
      arguments: {}
    rationale:
      code: R_BATTERY_RESERVE
      text: battery below the reserve floor while load exceeds generation
  - name: propellant_margin_breach
    priority: 12
    when:
      - [propellant.margin, below, 0]
    command:
      name: hold_burn
      arguments:
        burn: next_burn
    rationale:
      code: R_PROPELLANT_FLOOR
      text: executing the next burn would take the reserve below its floor
  - name: thermal_limit_approach
    priority: 15
    when:
      - [thermal.headroom, at_or_below, thermal_headroom_low]
    command:
      name: shed_load
      arguments:
        load: next_sheddable
    rationale:
      code: R_THERMAL_HEADROOM
      text: temperature headroom at or below the low threshold
  - name: power_margin_low
    priority: 20
    when:
      - [power.margin, below, power_margin_low]
    command:
      name: shed_load
      arguments:
        load: next_sheddable
    rationale:
      code: R_POWER_MARGIN
      text: power margin below the low threshold
  - name: storage_critical_no_window
    priority: 25
    when:
      - [data.storage_fraction, at_or_above, storage_critical_fraction]
      - [comms.window_open, equals, 0]
    command:
      name: suspend_collection
      arguments:
        instrument: science_instrument
    rationale:
      code: R_STORAGE_CRITICAL
      text: storage near capacity with no downlink window available
  - name: downlink_on_window
    priority: 30
    when:
      - [comms.window_open, equals, 1]
      - [data.storage_fraction, at_or_above, storage_high_fraction]
      - [data.downlink_active, equals, 0]
    command:
      name: start_downlink
      arguments:
        volume:
          metric: data.storage_used
    rationale:
      code: R_STORAGE_HIGH
      text: storage above the high watermark and a downlink window is open
  - name: warning_event_acknowledged
    priority: 50
    when:
      - [event.severity, at_or_above, warning]
    command:
      name: acknowledge
      arguments:
        reference: triggering_event
    rationale:
      code: R_EVENT_ACKNOWLEDGED
      text: a warning-level event is logged and acknowledged
  - name: pass_status_report
    priority: 55
    when:
      - [comms.window_open, equals, 1]
      - [data.downlink_active, equals, 0]
      - [data.storage_fraction, below, storage_high_fraction]
    command:
      name: report_status
      arguments:
        system: power
    rationale:
      code: R_PASS_REPORT
      text: an open window with no pending downlink carries the status report
  - name: downlink_window_closed
    priority: 60
    when:
      - [comms.window_open, equals, 0]
      - [data.downlink_active, equals, 1]
    command:
      name: stop_downlink
      arguments: {}
    rationale:
      code: R_WINDOW_CLOSED
      text: the downlink cannot continue past the window
  - name: power_margin_recovered
    priority: 65
    when:
      - [power.margin, at_or_above, power_margin_restore]
    command:
      name: restore_load
      arguments:
        load: last_shed
    rationale:
      code: R_POWER_RECOVERED
      text: margin restored with hysteresis above the shed threshold
