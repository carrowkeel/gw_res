project:
  name: slm-poc
  out_dir: runs/poc
  seed: 1337

generate:
  default_model: Qwen/Qwen2.5-7B-Instruct
  type_models: {}
  severity: s1
  text_type_weights:
    prose: 1.0
    conversation: 1.0
    definition: 1.0
    description: 1.0
  number_of_texts: 200000
  number_of_pairs: 30000
  temperature: 0.9
  top_p: 0.95
  max_tokens: 512
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  max_model_len: 2048
  dtype: bfloat16
  batch_size: 1024
  apply_filter: true
  deduplicate: true
  minimum_characters: 200

tokenizer:
  vocabulary_size: 16000
  minimum_frequency: 2

model:
  preset: poc-150m
  block_size: 1024
  dropout: 0.0
  tie_embeddings: true

pretrain:
  batch_size: 24
  gradient_accumulation_steps: 16
  maximum_steps: 40000
  learning_rate: 0.0006
  minimum_learning_rate: 0.00006
  warmup_steps: 1000
  weight_decay: 0.1
  gradient_clip: 1.0
  dtype: bfloat16
  compile_model: true
  log_interval: 20
  evaluation_interval: 1000
  evaluation_iterations: 100
  checkpoint_interval: 1000
  validation_fraction: 0.005

finetune:
  batch_size: 16
  gradient_accumulation_steps: 4
  epochs: 3
  learning_rate: 0.00002
  minimum_learning_rate: 0.000002
  warmup_ratio: 0.03
  dtype: bfloat16
  compile_model: false
  maximum_sequence_length: 1024
  checkpoint_interval: 500

eval:
  judge_model: null
  number_of_generation_samples: 200
  number_of_probe_questions: 100
  max_new_tokens: 256
  temperature: 0.8
  top_p: 0.95
  student_gpu_memory_utilization: 0.45
  judge_gpu_memory_utilization: 0.45

slurm:
  enabled: true
  partition: null
  account: null
  gres: gpu:l40s:1
  memory: 64G
  cpus_per_task: 8
  time_limit: "24:00:00"
  pretrain_gres: null
  log_dir: runs/poc/slurm_logs
  extra_sbatch: []
