project:
  name: slm-pilot
  out_dir: runs/pilot
  seed: 1337

generate:
  default_model: Qwen/Qwen2.5-7B-Instruct
  type_models: {}
  severity: s1
  text_type_weights:
    prose: 1.0
    conversation: 1.0
    definition: 1.0
    description: 1.0
  number_of_texts: 10000
  number_of_pairs: 2000
  temperature: 1.0
  top_p: 0.95
  frequency_penalty: 0.4
  max_tokens: 512
  workers: 4
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  max_model_len: 2048
  dtype: bfloat16
  batch_size: 512
  apply_filter: true
  deduplicate: true
  minimum_characters: 200

tokenizer:
  vocabulary_size: 4000
  minimum_frequency: 2

model:
  preset: pico
  block_size: 512
  dropout: 0.15
  tie_embeddings: true

pretrain:
  batch_size: 32
  gradient_accumulation_steps: 4
  maximum_steps: 3000
  learning_rate: 0.0006
  minimum_learning_rate: 0.00006
  warmup_steps: 100
  weight_decay: 0.1
  gradient_clip: 1.0
  dtype: bfloat16
  compile_model: true
  log_interval: 20
  evaluation_interval: 50
  evaluation_iterations: 40
  checkpoint_interval: 100
  validation_fraction: 0.02
  early_stop_patience: 6
  instruction_fraction: 0.1

finetune:
  batch_size: 16
  gradient_accumulation_steps: 2
  epochs: 2
  learning_rate: 0.00002
  minimum_learning_rate: 0.000002
  warmup_ratio: 0.03
  dtype: bfloat16
  compile_model: false
  maximum_sequence_length: 512
  checkpoint_interval: 100

eval:
  judge_model: null
  number_of_generation_samples: 40
  number_of_probe_questions: 40
  max_new_tokens: 200
  temperature: 0.8
  top_p: 0.95
  repetition_penalty: 1.0
  student_gpu_memory_utilization: 0.45
  judge_gpu_memory_utilization: 0.45

slurm:
  enabled: true
  partition: null
  account: null
  gres: gpu:l40s:1
  memory: 64G
  cpus_per_task: 8
  time_limit: "08:00:00"
  pretrain_gres: null
  log_dir: runs/pilot/slurm_logs
  extra_sbatch: []
